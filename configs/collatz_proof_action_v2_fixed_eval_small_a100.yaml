  max_depth: 30
  candidates_per_state: 50
  beam_width: 64

proposal_ranking:
  ranker_weight: 1.0
  value_weight: 0.25
  policy_weight: 0.05

output:
  dir: reports/runs/RUN-014B-fixed-eval
