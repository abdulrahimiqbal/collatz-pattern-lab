run:
  id: RUN-011-proof-action-v2-big-a100
  kind: proof_action_v2
  description: Proof-action v2 big A100 candidate, gated by RUN-010

data:
  rows: data/proof_action_v2/rows.jsonl
  train_splits: [train]
  val_splits: [val, test, challenge]

model:
  name: CollatzProofAction-v2-big
  d_model: 768
  encoder_layers: 12
  decoder_layers: 10
  heads: 12
  ffn_dim: 3072
  dropout: 0.1
  max_state_len: 4096
  max_action_len: 192
  max_vocab_size: 49152
  target_params: "200M-500M"
  gradient_checkpointing: true

training:
  max_steps: 20000
  batch_size: 4
  lr: 0.00012
  scheduler: cosine_with_warmup
  warmup_steps: 1500
  label_smoothing: 0.0
  value_loss_weight: 0.2
  ranker_loss_weight: 0.5
  gradient_clip: 1.0
  optimizer: AdamW
  seed: 1337
  checkpoint_every: 1000
  progress_every: 100
  bf16: true

evaluation:
  splits: [val, test, challenge]
  max_examples: 2048
  beam_size: 100
  top_k: 5
  use_action_memory: false

search:
  max_states: 512
  beam_size: 100

output:
  dir: remote_reports/proof_action_v2/RUN-011-proof-action-v2-big-a100
