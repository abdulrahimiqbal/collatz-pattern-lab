run:
  id: RUN-010-proof-action-v2-tiny-overfit
  kind: proof_action_v2
  description: Tiny proof-action v2 overfit/replay gate

data:
  rows: data/proof_action_v2_tiny/rows.jsonl
  train_splits: [train]
  val_splits: [train]

model:
  name: CollatzProofAction-v2-tiny
  d_model: 64
  encoder_layers: 2
  decoder_layers: 2
  heads: 4
  ffn_dim: 128
  dropout: 0.0
  max_state_len: 768
  max_action_len: 160
  max_vocab_size: 4096

training:
  max_steps: 180
  batch_size: 10
  lr: 0.001
  scheduler: cosine_with_warmup
  warmup_steps: 20
  gradient_clip: 1.0
  value_loss_weight: 0.2
  seed: 1337
  checkpoint_every: 90
  progress_every: 30
  bf16: false

evaluation:
  splits: [train]
  max_examples: 10
  beam_size: 20
  top_k: 5
  use_action_memory: true

output:
  dir: reports/proof_action_v2/RUN-010-proof-action-v2-tiny-overfit
